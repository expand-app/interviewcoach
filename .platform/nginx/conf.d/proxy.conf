# Tune the EB-managed nginx for SSE streaming.
#
# Default nginx proxy timeouts are 60s, which would kill our long-running
# /api/commentary stream mid-flight. Buffering also breaks SSE because
# nginx batches output instead of forwarding token-by-token.
#
# These directives are merged into the upstream server block by the
# AL2023 Node.js platform. They apply to ALL paths — so static asset
# requests get the same generous timeouts, which is harmless.

proxy_read_timeout 600s;
proxy_send_timeout 600s;
proxy_buffering off;
proxy_cache off;

# SSE clients read line-by-line; disable response buffering on this hop.
# The Next.js route already sets X-Accel-Buffering: no, but make it
# explicit at the nginx layer too.
proxy_set_header X-Accel-Buffering no;
